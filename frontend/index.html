<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoveSwipe</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh}
        .container{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .card{background:white;border-radius:32px;padding:40px;width:100%;max-width:380px;text-align:center}
        .logo{font-size:42px;font-weight:bold;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;color:transparent;margin-bottom:30px}
        input{width:100%;padding:14px;margin:10px 0;border:1px solid #ddd;border-radius:16px}
        button{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:30px;font-weight:bold;cursor:pointer}
        .swipe-card{background:white;border-radius:32px;width:340px;margin:20px auto;overflow:hidden}
        .card-img{height:400px;background:#667eea;display:flex;align-items:center;justify-content:center;font-size:80px}
        .card-info{padding:20px}
        .actions{display:flex;justify-content:center;gap:20px;padding:20px}
        .action-btn{width:65px;height:65px;border-radius:50%;font-size:30px;border:none;cursor:pointer}
        .like{background:#ff6b6b;color:white}
        .nope{background:white;color:#ff4757;border:2px solid #ff4757}
        .chat-container{height:100vh;display:flex;flex-direction:column;background:#f5f5f5}
        .chat-header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:50px 20px 15px;display:flex;gap:15px}
        .messages{flex:1;padding:20px;overflow-y:auto}
        .message{margin:10px 0;display:flex}
        .message.me{justify-content:flex-end}
        .message-bubble{max-width:75%;padding:12px 18px;border-radius:24px}
        .message.me .message-bubble{background:#667eea;color:white}
        .message.other .message-bubble{background:white}
        .chat-input{display:flex;padding:15px;gap:10px;background:white}
        .chat-input input{flex:1;padding:12px;border:1px solid #ddd;border-radius:30px}
        .match-item{background:white;padding:15px;margin:10px;border-radius:20px;cursor:pointer;display:flex;gap:15px}
    </style>
</head>
<body>
<div id="root"></div>
<script>
const API_URL = window.location.origin.includes('localhost') ? 'http://localhost:8001' : 'https://loveswipe-backend.onrender.com';
let token = localStorage.getItem('token');
let currentUser = null;
let feedUsers = [];
let currentIndex = 0;
let matches = [];
let activeChat = null;
let socket = null;

async function register(username, email, password, age) {
    try {
        const res = await fetch(`${API_URL}/api/register`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, email, password, age})
        });
        const data = await res.json();
        if (data.success) {
            localStorage.setItem('token', data.token);
            token = data.token;
            currentUser = {id: data.user_id};
            initSocket();
            loadFeed();
            renderApp();
            return true;
        }
        return false;
    } catch(e) { return false; }
}

async function login(email, password) {
    try {
        const res = await fetch(`${API_URL}/api/login`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password})
        });
        const data = await res.json();
        if (data.success) {
            localStorage.setItem('token', data.token);
            token = data.token;
            currentUser = {id: data.user_id};
            initSocket();
            loadFeed();
            renderApp();
            return true;
        }
        return false;
    } catch(e) { return false; }
}

async function loadFeed() {
    try {
        const res = await fetch(`${API_URL}/api/feed`, {
            headers: {'Authorization': `Bearer ${token}`}
        });
        feedUsers = await res.json();
        currentIndex = 0;
        renderSwipe();
    } catch(e) { console.error(e); }
}

async function likeUser(userId) {
    try {
        const res = await fetch(`${API_URL}/api/like`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
            body: JSON.stringify({user_id: userId})
        });
        const data = await res.json();
        if (data.match) alert('💖 It\'s a match! 💖');
        currentIndex++;
        renderSwipe();
    } catch(e) { console.error(e); }
}

async function loadMatches() {
    try {
        const res = await fetch(`${API_URL}/api/matches`, {
            headers: {'Authorization': `Bearer ${token}`}
        });
        matches = await res.json();
        renderMatches();
    } catch(e) { console.error(e); }
}

async function loadMessages(matchId) {
    try {
        const res = await fetch(`${API_URL}/api/messages/${matchId}`, {
            headers: {'Authorization': `Bearer ${token}`}
        });
        return await res.json();
    } catch(e) { return []; }
}

function initSocket() {
    if (socket) socket.close();
    const wsUrl = API_URL.replace('https', 'wss').replace('http', 'ws');
    socket = new WebSocket(`${wsUrl}/socket.io/?EIO=4&transport=websocket`);
    socket.onopen = () => {
        socket.send('40');
        setTimeout(() => socket.send(`42["join",{"user_id":${currentUser.id}}]`), 100);
    };
    socket.onmessage = (e) => {
        if (e.data.startsWith('42')) {
            try {
                const parsed = JSON.parse(e.data.substring(2));
                if (parsed[0] === 'new_message') {
                    if (activeChat && activeChat.id === parsed[1].match_id) {
                        const container = document.getElementById('messages');
                        const div = document.createElement('div');
                        div.className = `message ${parsed[1].from_user === currentUser.id ? 'me' : 'other'}`;
                        div.innerHTML = `<div class="message-bubble">${parsed[1].message}</div>`;
                        container.appendChild(div);
                        container.scrollTop = container.scrollHeight;
                    }
                    loadMatches();
                }
            } catch(e) {}
        }
    };
}

function sendMessage(matchId, message) {
    if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(`42["send_message",{"match_id":${matchId},"from_user":${currentUser.id},"message":"${message}"}]`);
    }
}

function renderAuth() {
    let mode = 'login';
    const html = `
        <div class="container">
            <div class="card">
                <div class="logo">❤️ LoveSwipe</div>
                <div style="display:flex;gap:10px;margin-bottom:20px">
                    <button onclick="setMode('login')" id="loginBtn" style="flex:1">Login</button>
                    <button onclick="setMode('register')" id="registerBtn" style="flex:1">Sign Up</button>
                </div>
                <div id="registerFields" style="display:none">
                    <input type="text" id="regUsername" placeholder="Username">
                    <input type="number" id="regAge" placeholder="Age">
                </div>
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Password">
                <button onclick="submitAuth()" id="submitBtn">Login</button>
            </div>
        </div>
    `;
    document.getElementById('root').innerHTML = html;
    window.setMode = (newMode) => {
        mode = newMode;
        document.getElementById('registerFields').style.display = newMode === 'register' ? 'block' : 'none';
        document.getElementById('submitBtn').innerText = newMode === 'login' ? 'Login' : 'Create Account';
    };
    window.submitAuth = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if (mode === 'login') {
            const success = await login(email, password);
            if (!success) alert('Login failed');
        } else {
            const username = document.getElementById('regUsername').value;
            const age = parseInt(document.getElementById('regAge').value);
            const success = await register(username, email, password, age);
            if (!success) alert('Registration failed');
        }
    };
}

function renderSwipe() {
    if (!feedUsers.length || currentIndex >= feedUsers.length) {
        document.getElementById('root').innerHTML = `<div class="container"><div class="card"><h2>No more users!</h2><button onclick="loadFeed()">Refresh</button></div></div>`;
        return;
    }
    const user = feedUsers[currentIndex];
    const html = `
        <div style="min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2)">
            <div style="padding:50px 20px 20px;display:flex;justify-content:space-between;background:rgba(0,0,0,0.2)">
                <div style="font-size:24px;font-weight:bold;color:white">❤️ LoveSwipe</div>
                <div><button onclick="loadMatches()" style="background:white;border:none;padding:10px 20px;border-radius:30px">💬 Matches</button></div>
            </div>
            <div class="swipe-card">
                <div class="card-img">👤</div>
                <div class="card-info">
                    <h2>${user.username}, ${user.age}</h2>
                </div>
                <div class="actions">
                    <button class="action-btn nope" onclick="nextUser()">✕</button>
                    <button class="action-btn like" onclick="likeUser(${user.id})">❤️</button>
                </div>
            </div>
        </div>
    `;
    document.getElementById('root').innerHTML = html;
}

function nextUser() { currentIndex++; renderSwipe(); }

function renderMatches() {
    if (!matches.length) {
        document.getElementById('root').innerHTML = `<div class="container"><div class="card"><h2>No matches yet</h2><button onclick="loadFeed()">Back to Swipe</button></div></div>`;
        return;
    }
    let html = `<div style="min-height:100vh;background:#f5f5f5"><div style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:50px 20px 20px"><button onclick="loadFeed()" style="background:rgba(255,255,255,0.2);border:none;padding:8px 16px;border-radius:20px;color:white">← Back</button><h2 style="margin-top:20px">💖 Your Matches</h2></div>`;
    matches.forEach(m => {
        html += `<div class="match-item" onclick="openChat(${m.id}, '${m.username}')">
            <div style="width:50px;height:50px;background:#667eea;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white">👤</div>
            <div><strong>${m.username}</strong></div>
        </div>`;
    });
    html += `</div>`;
    document.getElementById('root').innerHTML = html;
}

async function openChat(matchId, username) {
    activeChat = {id: matchId, username};
    const messages = await loadMessages(matchId);
    let html = `<div class="chat-container">
        <div class="chat-header"><button onclick="loadMatches()" style="background:rgba(255,255,255,0.2);border:none;padding:8px 16px;border-radius:20px;color:white">←</button><strong>${username}</strong></div>
        <div class="messages" id="messages">`;
    messages.forEach(m => {
        html += `<div class="message ${m.from_user === currentUser.id ? 'me' : 'other'}"><div class="message-bubble">${m.message}</div></div>`;
    });
    html += `</div><div class="chat-input"><input type="text" id="msgInput" placeholder="Type a message..."><button onclick="sendChatMessage()">Send</button></div></div>`;
    document.getElementById('root').innerHTML = html;
    const container = document.getElementById('messages');
    if (container) container.scrollTop = container.scrollHeight;
}

async function sendChatMessage() {
    const input = document.getElementById('msgInput');
    const msg = input.value.trim();
    if (!msg) return;
    sendMessage(activeChat.id, msg);
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message me';
    div.innerHTML = `<div class="message-bubble">${msg}</div>`;
    container.appendChild(div);
    input.value = '';
    container.scrollTop = container.scrollHeight;
}

window.nextUser = nextUser;
window.likeUser = likeUser;
window.loadMatches = loadMatches;
window.openChat = openChat;
window.sendChatMessage = sendChatMessage;
window.loadFeed = loadFeed;

function renderApp() {
    if (!token) renderAuth();
    else loadFeed();
}

renderApp();
</script>
</body>
</html>
